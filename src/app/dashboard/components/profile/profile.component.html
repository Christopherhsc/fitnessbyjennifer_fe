<section class="profile-shell">
  <header class="profile-hero">
    <div class="profile-card">
      <span class="eyebrow">{{ content().eyebrow }}</span>
      <h1>{{ content().title }}</h1>

      <div class="profile-identity">
        <img
          *ngIf="profileImage"
          [src]="profileImage"
          onerror="this.onerror=null;this.src='/default_profile_image.jpg'"
          alt="Profile picture"
          class="profile-img"
        />

        <div class="profile-meta">
          <h2>{{ content().introTitle }}, {{ firstName || content().guest }}</h2>
          <p>{{ email }}</p>
        </div>
      </div>
    </div>

    <div class="profile-note">
      <h3>{{ content().privacyTitle }}</h3>
      <p>{{ content().privacyText }}</p>
    </div>
  </header>
  <section class="settings-grid">
    <article class="setting-card">
      <div class="setting-copy">
        <h3>{{ content().remindersTitle }}</h3>
        <p>{{ content().remindersText }}</p>
      </div>

      <label class="toggle-card">
        <div class="toggle-copy">
          <span>{{ content().remindersLabel }}</span>
        </div>

        <span class="switch">
          <input
            type="checkbox"
            [(ngModel)]="bookingReminders"
            (ngModelChange)="profileSettings()"
          />
          <span class="slider"></span>
        </span>
      </label>

      <div *ngIf="bookingReminders" class="phone-panel">
        <label for="phone">{{ content().phoneLabel }}</label>
        <input
          id="phone"
          type="tel"
          [placeholder]="content().phonePlaceholder"
          [(ngModel)]="phoneNumber"
          (input)="validatePhoneNumber()"
          maxlength="8"
          inputmode="numeric"
        />
        <p class="phone-help">{{ content().phoneHelp }}</p>
        <p *ngIf="phoneError" class="error-text">{{ phoneError }}</p>
      </div>
    </article>
  </section>
</section>
