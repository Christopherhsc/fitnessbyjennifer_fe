<header [class.scrolled]="isScrolled">
  <div class="header-shell">
    <a class="logo" [routerLink]="['/']" (click)="setActive('home')">
      <span class="logo-mark">Fitness</span>
      <span class="logo-name">Jennifer Rasmussen</span>
    </a>

    <button
      type="button"
      class="menu-toggle"
      [attr.aria-label]="content().openMenuLabel"
      (click)="toggleMenu()"
    >
      <i class="bx" [ngClass]="isMenuOpen ? 'bx-x' : 'bx-menu'"></i>
    </button>

    <nav class="navbar" [ngClass]="{ active: isMenuOpen }">
      <ul class="nav-links">
        <ng-container *ngIf="!isLoggedIn">
          <li *ngFor="let link of navLinks(); let i = index; trackBy: trackLink">
            <a
              [ngClass]="{ active: activeLink === link.id }"
              (click)="setActive(link.id)"
            >
              {{ link.label }}
            </a>
          </li>
        </ng-container>

        <li *ngIf="isLoggedIn">
          <a
            [class.active]="isDashboardRoute()"
            (click)="navigateLoggedIn()"
          >
            {{ isDashboardRoute() ? content().page : content().dashboard }}
          </a>
        </li>
      </ul>

      <div class="nav-actions">
        <button
          type="button"
          class="language-toggle"
          [attr.aria-label]="content().toggleLabel"
          [attr.title]="content().toggleLabel"
          (click)="toggleLanguage()"
        >
          <span class="flag" [class.active]="currentLanguage() === 'da'">🇩🇰</span>
          <span class="language-thumb" [class.english]="currentLanguage() === 'en'"></span>
          <span class="flag" [class.active]="currentLanguage() === 'en'">🇬🇧</span>
        </button>

        <button *ngIf="!isLoggedIn" type="button" class="btn" (click)="loginWithGoogle()">
          {{ showComingSoon ? content().comingSoon : content().login }}
        </button>
        <button *ngIf="isLoggedIn" type="button" class="btn btn-secondary" (click)="logout()">
          {{ content().logout }}
        </button>
      </div>
    </nav>
  </div>
</header>
