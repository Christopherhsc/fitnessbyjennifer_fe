<section class="contact" id="contact">
  <div class="section-shell">
    <div class="contact-card card-surface" appRevealOnScroll>
      <div class="contact-copy" appRevealOnScroll revealVariant="left">
        <span class="eyebrow">{{ content().eyebrow }}</span>
        <h2 class="heading" [innerHTML]="content().title"></h2>
        <p class="section-copy">{{ content().intro }}</p>

        <ul class="contact-points">
          <li *ngFor="let point of content().points">{{ point }}</li>
        </ul>
      </div>

      <div class="contact-actions" appRevealOnScroll revealVariant="right" [revealDelay]="140">
        <a
          [href]="content().mailto"
          class="btn"
        >
          {{ content().buttonLabel }}
        </a>

        <div class="contact-meta">
          <span>{{ content().emailLabel }}</span>
          <strong>Fitnessbyjennifer25&#64;gmail.com</strong>
        </div>
      </div>
    </div>
  </div>
</section>
