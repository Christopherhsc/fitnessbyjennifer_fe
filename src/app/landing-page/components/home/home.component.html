<section class="home" id="home">
  <div class="section-shell home-shell">
    <div class="home-content" appRevealOnScroll revealVariant="left">
      <span class="eyebrow">{{ content().eyebrow }}</span>
      <h1>{{ content().title }}</h1>
      <p class="lead">{{ content().lead }}</p>

      <div class="typewriter" appRevealOnScroll [revealDelay]="120">
        <span>{{ content().typewriter }}</span>
      </div>

      <div class="home-actions">
        <a href="#contact" class="btn">{{ content().primaryCta }}</a>
        <a href="#services" class="btn btn-secondary">{{ content().secondaryCta }}</a>
      </div>
    </div>

    <div class="home-visual" appRevealOnScroll revealVariant="right" [revealDelay]="120">
      <div class="visual-orb orb-one"></div>
      <div class="visual-orb orb-two"></div>
      <div class="image-frame card-surface">
        <img src="/landingpage-image.png" [alt]="content().imageAlt" />
      </div>

      <div class="floating-note card-surface" appRevealOnScroll revealVariant="scale" [revealDelay]="280">
        <span>{{ content().noteLabel }}</span>
        <strong>{{ content().noteTitle }}</strong>
      </div>
    </div>
  </div>
</section>
