<section class="about" id="about">
  <div class="section-shell">
    <div class="about-header">
      <div appRevealOnScroll>
        <span class="eyebrow">{{ content().eyebrow }}</span>
        <h2 class="heading" [innerHTML]="content().title"></h2>
      </div>

      <p class="section-copy" appRevealOnScroll [revealDelay]="120">
        {{ content().intro }}
      </p>
    </div>

    <div class="about-layout">
      <div class="about-cards">
        <button
          class="card"
          type="button"
          *ngFor="let card of cardData(); let i = index; trackBy: trackCard"
          [class.active]="selectedCardIndex === i"
          (click)="selectCard(i)"
          appRevealOnScroll
          revealVariant="scale"
          [revealDelay]="120 + i * 120"
        >
          <div class="card-image">
            <img [src]="card.image" [alt]="card.cardTitle" />
            <span class="card-state" [class.card-state-inactive]="selectedCardIndex !== i">
              {{ selectedCardIndex === i ? content().active : content().readMore }}
            </span>
          </div>

          <div class="card-copy">
            <h3>{{ card.cardTitle }}</h3>
            <p *ngIf="isBelow1400px">{{ card.cardText }}</p>
          </div>
        </button>
      </div>

      <div
        *ngIf="!isBelow1400px"
        class="about-information card-surface"
        appRevealOnScroll
        revealVariant="right"
        [revealDelay]="160"
      >
        <div class="about-information-header">
          <h3>{{ selectedCard().cardTitle }}</h3>
        </div>

        <p [class.fade-in]="fadeInClass" class="fade-text">
          {{ selectedCard().cardText }}
        </p>

        <ul class="highlights">
          <li *ngFor="let highlight of content().highlights">{{ highlight }}</li>
        </ul>
      </div>
    </div>
  </div>
</section>
